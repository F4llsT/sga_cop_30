<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABACATE GIGANTESCO</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="container">
        <div class="forma-box login">
            <form action="">
                <h1>Entrar</h1>
                <div class="input-box">
                    <input type="text" placeholder="usuario" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="senha" required>
                    <i class='bx bxs-lock'></i>
                </div>
                <div class="esqueceu-link">
                    <a href="#">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="btn">Entrar</button>
                <p>Entrar com outras plataformas</p>
                <div class="outrasP-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-github'></i></a>
                    <a href="#"><i class='bx bxl-linkedin'></i></a>
                </div>
            </form>
        </div> 
        
        <div class="forma-box registro">
            <form action="">
                <h1>Registro</h1>
                <div class="input-box">
                    <input type="text" placeholder="usuario" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="senha" required>
                    <i class='bx bxs-lock'></i>
                </div>
                <button type="submit" class="btn">Registrar</button>
                <p>Registrar com outras plataformas</p>
                <div class="outrasP-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-github'></i></a>
                    <a href="#"><i class='bx bxl-linkedin'></i></a>
                </div>
            </form>
        </div>
        <div class="alternar-box">
            <div class="alternar-card alternar-left">
                <h1> Olá, bem vindo</h1>
                <p>não tem acesso a conta?</p>
                <button class="btn registrar-btn">Registrar</button>
            </div>
            <div class="alternar-card alternar-right">
                <h1> Bem vindo!</h1>
                <p>já tem uma conta?</p>
                <button class="btn entrar-btn">Entrar</button>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
